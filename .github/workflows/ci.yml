name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-gcc
            os: ubuntu-latest
            cxx: g++
          - name: ubuntu-clang
            os: ubuntu-latest
            cxx: clang++
          - name: ubuntu-arm64-gcc
            os: ubuntu-24.04-arm
            cxx: g++
          - name: macos-appleclang
            os: macos-latest
            cxx: c++
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              cmake build-essential clang libfmt-dev libgtest-dev
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            # Avoid reinstalling preinstalled or pinned formulae on GitHub macOS runners
            (brew list cmake >/dev/null 2>&1) || brew install cmake
            (brew list fmt >/dev/null 2>&1) || brew install fmt
            (brew list googletest >/dev/null 2>&1) || brew install googletest
          fi
      - name: Install ccache
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get install -y --no-install-recommends ccache
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            (brew list ccache >/dev/null 2>&1) || brew install ccache
          fi
      - name: Prepare ccache directory
        run: mkdir -p ~/.ccache
      - name: Cache ccache
        uses: actions/cache@v3
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/CMakeLists.txt', 'include/**', 'tests/**') }}
          restore-keys: |
            ${{ runner.os }}-ccache-
      - name: Configure
        run: CXX=${{ matrix.cxx }} cmake -S . -B runs/ci/build -DGINT_BUILD_TESTS=ON -DGINT_BUILD_BENCHMARKS=OFF -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
      - name: Build
        run: cmake --build runs/ci/build --config Debug --parallel
      - name: Run tests
        run: ctest --test-dir runs/ci/build -j 2 --output-on-failure
      - name: Header warning smoke
        run: |
          mkdir -p runs/ci
          cat > runs/ci/gint_header_warning_smoke.cpp <<'CPP'
          #include <gint/gint.h>
          int main() {
              gint::integer<256, unsigned> x = 1;
              auto y = x >> 1;
              return static_cast<int>(static_cast<unsigned long long>(y));
          }
          CPP
          ${{ matrix.cxx }} -std=c++11 -Wall -Wextra -Werror -Iinclude runs/ci/gint_header_warning_smoke.cpp -c -o runs/ci/gint_header_warning_smoke.o

  build-cxx17:
    name: build (ubuntu-latest-cxx17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake build-essential libfmt-dev libgtest-dev ccache
      - name: Prepare ccache directory
        run: mkdir -p ~/.ccache
      - name: Cache ccache
        uses: actions/cache@v3
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/CMakeLists.txt', 'include/**', 'tests/**') }}
          restore-keys: |
            ${{ runner.os }}-ccache-
      - name: Configure
        run: cmake -S . -B runs/ci/build-cxx17 -DGINT_BUILD_TESTS=ON -DGINT_BUILD_TESTS_CXX17=ON -DGINT_BUILD_BENCHMARKS=OFF -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
      - name: Build C++17 tests
        run: cmake --build runs/ci/build-cxx17 --target gint_tests_cxx17 --config Debug --parallel
      - name: Run C++17 tests
        run: ./runs/ci/build-cxx17/gint_tests_cxx17 --gtest_color=yes

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake build-essential \
            libfmt-dev libgtest-dev lcov
      - name: Configure
        run: cmake -S . -B runs/ci/build-coverage -DENABLE_COVERAGE=ON -DGINT_BUILD_TESTS=ON -DGINT_BUILD_BENCHMARKS=OFF
      - name: Build
        run: cmake --build runs/ci/build-coverage --config Debug --parallel
      - name: Run tests
        run: ctest --test-dir runs/ci/build-coverage --output-on-failure
      - name: Generate coverage
        run: |
          lcov --capture --directory runs/ci/build-coverage --output-file runs/ci/coverage.info --ignore-errors mismatch
          lcov --remove runs/ci/coverage.info '/usr/*' '*/tests/*' --output-file runs/ci/coverage.info
          lcov --summary runs/ci/coverage.info
      - name: Upload coverage info
        uses: actions/upload-artifact@v4
        with:
          name: coverage-info
          path: runs/ci/coverage.info

  sanitizers:
    name: sanitizers (ubuntu-clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake build-essential clang \
            libfmt-dev libgtest-dev
      - name: Configure
        run: CXX=clang++ cmake -S . -B runs/ci/build-sanitizers -DENABLE_SANITIZERS=ON -DGINT_BUILD_TESTS=ON -DGINT_BUILD_TESTS_RELEASE=OFF -DGINT_BUILD_BENCHMARKS=OFF
      - name: Build
        run: cmake --build runs/ci/build-sanitizers --config Debug --parallel
      - name: Run tests
        run: ctest --test-dir runs/ci/build-sanitizers --output-on-failure

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: Check code format
        run: |
          FILES=$(git ls-files '*.cpp' '*.hpp' '*.h')
          if [ -n "$FILES" ]; then
            clang-format -i --style=file $FILES
            git diff --exit-code
          fi

  benchmark:
    name: benchmark smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libfmt-dev libbenchmark-dev libboost-dev
      - name: Configure
        run: cmake -S . -B runs/ci/build-benchmark-smoke -DCMAKE_BUILD_TYPE=Release -DGINT_BUILD_TESTS=OFF -DGINT_BUILD_BENCHMARKS=ON
      - name: Build
        run: cmake --build runs/ci/build-benchmark-smoke --parallel
      - name: Run benchmark smoke tests
        run: |
          # Smoke only: keep this short. Use local runs or a dedicated perf workflow for performance conclusions.
          runs/ci/build-benchmark-smoke/perf_benchmark_int256 --benchmark_min_time=0.01s
          runs/ci/build-benchmark-smoke/perf_compare_int256 --benchmark_min_time=0.01s
