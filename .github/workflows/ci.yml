name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-gcc
            os: ubuntu-latest
            cxx: g++
          - name: ubuntu-clang
            os: ubuntu-latest
            cxx: clang++
          - name: ubuntu-arm64-gcc
            os: ubuntu-24.04-arm
            cxx: g++
          - name: ubuntu-arm64-clang
            os: ubuntu-24.04-arm
            cxx: clang++
          - name: macos-appleclang
            os: macos-latest
            cxx: c++
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              cmake build-essential clang libfmt-dev libgtest-dev
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            # Avoid reinstalling preinstalled or pinned formulae on GitHub macOS runners
            (brew list cmake >/dev/null 2>&1) || brew install cmake
            (brew list fmt >/dev/null 2>&1) || brew install fmt
            (brew list googletest >/dev/null 2>&1) || brew install googletest
          fi
      - name: Install ccache
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get install -y --no-install-recommends ccache
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            (brew list ccache >/dev/null 2>&1) || brew install ccache
          fi
      - name: Prepare ccache directory
        run: mkdir -p ~/.ccache
      - name: Cache ccache
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-${{ matrix.name }}-ccache-${{ hashFiles('**/CMakeLists.txt', 'include/**', 'tests/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.name }}-ccache-
      - name: Configure
        run: CXX=${{ matrix.cxx }} cmake -S . -B runs/ci/build -DGINT_BUILD_TESTS=ON -DGINT_BUILD_BENCHMARKS=OFF -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
      - name: Build
        run: cmake --build runs/ci/build --config Debug --parallel
      - name: Run tests
        run: ctest --test-dir runs/ci/build -j 2 --output-on-failure
      - name: Header warning smoke
        run: |
          mkdir -p runs/ci
          cat > runs/ci/gint_header_warning_smoke.cpp <<'CPP'
          #include <gint/gint.h>
          int main() {
              gint::integer<256, unsigned> x = 1;
              auto y = x >> 1;
              return static_cast<int>(static_cast<unsigned long long>(y));
          }
          CPP
          ${{ matrix.cxx }} -std=c++11 -Wall -Wextra -Werror -Iinclude runs/ci/gint_header_warning_smoke.cpp -c -o runs/ci/gint_header_warning_smoke.o

  build-cxx17:
    name: build (ubuntu-latest-cxx17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake build-essential libfmt-dev libgtest-dev ccache
      - name: Prepare ccache directory
        run: mkdir -p ~/.ccache
      - name: Cache ccache
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/CMakeLists.txt', 'include/**', 'tests/**') }}
          restore-keys: |
            ${{ runner.os }}-ccache-
      - name: Configure
        run: cmake -S . -B runs/ci/build-cxx17 -DGINT_BUILD_TESTS=ON -DGINT_BUILD_TESTS_CXX17=ON -DGINT_BUILD_BENCHMARKS=OFF -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
      - name: Build C++17 tests
        run: cmake --build runs/ci/build-cxx17 --target gint_tests_cxx17 --config Debug --parallel
      - name: Run C++17 tests
        run: ./runs/ci/build-cxx17/gint_tests_cxx17 --gtest_color=yes

  cmake-3-13:
    name: package contract (CMake 3.13)
    runs-on: ubuntu-latest
    env:
      CMAKE_VERSION: 3.13.5
      CMAKE_ARCHIVE_SHA256: e2fd0080a6f0fc1ec84647acdcd8e0b4019770f48d83509e6a5b0b6ea27e5864
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install compiler and test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential curl libfmt-dev libgtest-dev
      - name: Install pinned CMake 3.13
        run: |
          mkdir -p runs/ci/cmake-3.13
          archive="runs/ci/cmake-${CMAKE_VERSION}-Linux-x86_64.tar.gz"
          curl --fail --location --retry 3 \
            "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-Linux-x86_64.tar.gz" \
            --output "$archive"
          echo "${CMAKE_ARCHIVE_SHA256}  ${archive}" | sha256sum --check --strict
          tar -xzf "$archive" -C runs/ci/cmake-3.13 --strip-components=1
          echo "$PWD/runs/ci/cmake-3.13/bin" >> "$GITHUB_PATH"
      - name: Configure with CMake 3.13
        run: cmake -S . -B runs/ci/build-cmake-3.13 -DGINT_BUILD_TESTS=ON -DGINT_BUILD_TESTS_RELEASE=OFF -DGINT_BUILD_BENCHMARKS=OFF
      - name: Build isolated-header consumer
        run: cmake --build runs/ci/build-cmake-3.13 --target gint_consumer_header_contract --parallel
      - name: Run package and header contracts
        run: |
          cd runs/ci/build-cmake-3.13
          ctest -N -R '^consumer\.(package|header_contract)' | grep -Eq 'Total Tests: [1-9][0-9]*'
          ctest --output-on-failure -R '^consumer\.(package|header_contract)'

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake build-essential \
            libfmt-dev libgtest-dev lcov
      - name: Configure
        run: cmake -S . -B runs/ci/build-coverage -DENABLE_COVERAGE=ON -DGINT_BUILD_TESTS=ON -DGINT_BUILD_BENCHMARKS=OFF
      - name: Build
        run: cmake --build runs/ci/build-coverage --config Debug --parallel
      - name: Run tests
        run: ctest --test-dir runs/ci/build-coverage --output-on-failure
      - name: Generate coverage
        run: |
          lcov --capture --directory runs/ci/build-coverage --output-file runs/ci/coverage.info --ignore-errors mismatch
          lcov --remove runs/ci/coverage.info '/usr/*' '*/tests/*' --output-file runs/ci/coverage.info
          lcov --summary runs/ci/coverage.info
      - name: Upload coverage info
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-info
          path: runs/ci/coverage.info

  sanitizers:
    name: sanitizers (ubuntu-clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake build-essential clang \
            libfmt-dev libgtest-dev
      - name: Configure
        run: CXX=clang++ cmake -S . -B runs/ci/build-sanitizers -DENABLE_SANITIZERS=ON -DGINT_BUILD_TESTS=ON -DGINT_BUILD_TESTS_RELEASE=OFF -DGINT_BUILD_BENCHMARKS=OFF
      - name: Build
        run: cmake --build runs/ci/build-sanitizers --config Debug --parallel
      - name: Run tests
        run: ctest --test-dir runs/ci/build-sanitizers --output-on-failure

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: Check code format
        run: |
          git ls-files '*.cpp' '*.hpp' '*.h' | while IFS= read -r file; do
            clang-format -i --style=file "$file"
          done
          git diff --exit-code

  dockerfile:
    name: development image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build development image
        run: docker build --tag gint:ci .
      - name: Verify toolchain baselines
        run: |
          test "$(docker run --rm gint:ci uname -m)" = x86_64
          docker run --rm gint:ci sh -lc 'g++ -dumpfullversion -dumpversion | grep -E "^8\.5(\.|$)"'
          docker run --rm gint:ci clang++ --version
          docker run --rm gint:ci cmake --version
      - name: Run GCC 8.5 C++11 test matrix
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            gint:ci \
            sh -lc '
              CXX=g++ cmake -S . -B runs/ci/docker-gcc \
                -DGINT_BUILD_TESTS=ON \
                -DGINT_BUILD_BENCHMARKS=OFF &&
              cmake --build runs/ci/docker-gcc --parallel &&
              ctest --test-dir runs/ci/docker-gcc --output-on-failure
            '

  benchmark:
    name: benchmark smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libfmt-dev libbenchmark-dev libboost-dev
      - name: Configure
        run: cmake -S . -B runs/ci/build-benchmark-smoke -DCMAKE_BUILD_TYPE=Release -DGINT_BUILD_TESTS=OFF -DGINT_BUILD_BENCHMARKS=ON
      - name: Build
        run: cmake --build runs/ci/build-benchmark-smoke --parallel
      - name: Run benchmark smoke tests
        run: |
          # Smoke only: keep this short. Use local runs or a dedicated perf workflow for performance conclusions.
          runs/ci/build-benchmark-smoke/perf_benchmark_int256 --benchmark_min_time=0.01s
          runs/ci/build-benchmark-smoke/perf_compare_int256 --benchmark_min_time=0.01s
